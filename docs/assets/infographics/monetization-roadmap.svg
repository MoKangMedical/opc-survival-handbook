      <text x="820" y="497" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" fill="#FF6B6B" font-weight="900" text-anchor="middle">$5K-10K+</text>
      <text x="820" y="539" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#4A4D5E" font-weight="700" text-anchor="middle">产品矩阵</text>
