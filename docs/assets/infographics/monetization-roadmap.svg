      <text x="340" y="730" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" fill="#1A1C2E" font-weight="900" text-anchor="middle">规模</text>
      <text x="340" y="782" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" fill="#7C3AED" font-weight="900" text-anchor="middle">$2K-5K</text>
      <text x="340" y="824" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#4A4D5E" font-weight="700" text-anchor="middle">内容工厂</text>
