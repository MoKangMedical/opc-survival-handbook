      <text x="760" y="1040" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" fill="#1A1C2E" font-weight="900" text-anchor="middle">优化</text>
      <text x="760" y="1092" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" fill="#F5A623" font-weight="900" text-anchor="middle">$500-1.5K</text>
      <text x="760" y="1134" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#4A4D5E" font-weight="700" text-anchor="middle">$1K MRR</text>
