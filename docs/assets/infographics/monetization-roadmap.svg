  <rect width="1200" height="1600" fill="url(#grid)" opacity="0.28"/>
  <text x="600" y="135" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="58" fill="#1A1C2E" font-weight="900" text-anchor="middle">OPC变现路线图</text>
  <text x="600" y="188" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="27" fill="#4A4D5E" font-weight="600" text-anchor="middle">从$0到$10K/月的一人创作者路径</text>
  <path d="M190 1320 C 870 1320, 250 900, 710 850 S 1030 520, 805 350" fill="none" stroke="#E8D5B7" stroke-width="74" stroke-linecap="round"/>
  <path d="M190 1320 C 870 1320, 250 900, 710 850 S 1030 520, 805 350" fill="none" stroke="#F5A623" stroke-width="34" stroke-linecap="round"/>

    <g filter="url(#softShadow)">
      <rect x="85" y="1165" width="290" height="210" rx="28" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="5"/>
      <text x="230" y="1218" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="#0EA5E9" font-weight="900" text-anchor="middle">Phase 1</text>
      <text x="230" y="1260" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="38" fill="#1A1C2E" font-weight="900" text-anchor="middle">验证</text>
      <text x="230" y="1312" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="34" fill="#0EA5E9" font-weight="900" text-anchor="middle">$0-500</text>
      <text x="230" y="1354" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#4A4D5E" font-weight="700" text-anchor="middle">第一单</text>
