  <text x="115" y="1480" font-family="'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" fill="#1A1C2E" font-weight="700" >核心原则：每个阶段只优化一个主指标，不要提前复杂化。</text>

